{% extends "base.html" %}

{% block content %}
<div style="height: 80vh; display: flex; justify-content: center; align-items: center; padding: 2rem;">
    <div class="glass" style="padding: 4rem 3rem; width: 450px; text-align: center; border-radius: var(--radius-lg); border: 1px solid var(--border-strong); box-shadow: var(--shadow-float); animation: fadeIn 0.8s ease-out;">
        <div style="width: 70px; height: 70px; background: var(--primary-glow); border-radius: 20px; display: flex; justify-content: center; align-items: center; margin: 0 auto 2rem;">
            <i class="fa-solid fa-shield-halved" style="font-size: 2rem; color: var(--primary);"></i>
        </div>
        
        <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 0.8rem; color: var(--text-heading);">Welcome</h1>
        <p style="color: var(--text-muted); margin-bottom: 3rem; font-weight: 500; font-size: 1.1rem;">Sign in to access news intelligence dashboard.</p>
        
        <a href="{{ url_for('auth.login_google') }}" class="google-btn glass">
            <div class="google-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                    <path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/>
                    <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                    <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                </svg>
            </div>
            Continue with Google
        </a>
        
        <div style="margin-top: 3rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">
            By continuing, you agree to our 
            <a href="{{ url_for('auth.terms') }}" style="color: var(--primary); text-decoration: none;">Terms & Project Disclaimer</a>.
        </div>

        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-light); font-size: 0.75rem; color: var(--text-dim); font-style: italic;">
            <i class="fa-solid fa-code" style="margin-right: 0.4rem;"></i> This is a non-professional demonstration project.
        </div>
    </div>
</div>

<style>
    .google-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.2rem;
        color: var(--text-heading);
        text-decoration: none;
        border-radius: 16px;
        transition: var(--transition-base);
        border: 1px solid var(--border-strong);
        font-weight: 700;
        background: white !important;
    }

    .google-btn:hover {
        transform: translateY(-2px);
        border-color: var(--primary-light);
        box-shadow: var(--shadow-primary);
    }

    .google-icon-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>
{% endblock %}
